[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "cp -r public/uploads /app/uploads_seed"
]

[start]
cmd = "if [ -z \"$(ls -A public/uploads 2>/dev/null)\" ]; then cp -r /app/uploads_seed/. public/uploads/; fi && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
